name: Weekly Grant Scraper

# 允許手動執行，也會在每週一上午 8:00（台北時間）自動執行
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'
      timezone: 'Asia/Taipei'

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      # 檢出程式碼
      - uses: actions/checkout@v3

      # 安裝 Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 安裝依賴套件和 Playwright 瀏覽器
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps

      # 執行爬蟲程式並列出目錄檔案
      - name: Run scraper
        run: |
          python grant_scraper.py
          ls -la .

      # 上傳產出的 Excel 檔案為 artifact
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: grant-reports
          path: daysee_grants.xlsx
