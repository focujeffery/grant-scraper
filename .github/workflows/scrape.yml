name: Weekly Grant Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'
      timezone: 'Asia/Taipei'

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps

      - name: Prepare folders
        run: |
          mkdir -p outputs
          if [ -f state ]; then
            rm -f state
          fi
          mkdir -p state

      - name: Run scraper
        run: |
          python grant_scraper.py
          echo "=== CURRENT DIR ==="
          pwd
          echo "=== FILES IN ROOT ==="
          ls -la .
          echo "=== FILES IN OUTPUTS ==="
          ls -la outputs || true
          echo "=== FIND XLSX ==="
          find . -maxdepth 3 -name "*.xlsx" -print

      - name: Upload full report
        uses: actions/upload-artifact@v4
        with:
          name: daysee_grants
          path: outputs/daysee_grants.xlsx
          if-no-files-found: error

      - name: Upload delta report
        uses: actions/upload-artifact@v4
        with:
          name: daysee_grants_delta_only
          path: outputs/daysee_grants_delta_only.xlsx
          if-no-files-found: warn

      - name: Send email report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ATTACH_MAIN: outputs/daysee_grants.xlsx
          ATTACH_DELTA: outputs/daysee_grants_delta_only.xlsx
        run: |
          python send_report_email.py
