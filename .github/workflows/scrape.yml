name: Weekly Grant Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'
      timezone: 'Asia/Taipei'

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps

      - name: Prepare folders
        run: |
          mkdir -p outputs
          if [ -f state ]; then
            rm -f state
          fi
          mkdir -p state

      - name: Run scraper and generate weekly delta
        id: scrape
        env:
          OUTPUT_XLSX: outputs/daysee_grants.xlsx
          DELTA_XLSX: outputs/daysee_grants_delta_only.xlsx
          PREVIOUS_XLSX: state/daysee_grants_latest.xlsx
        run: |
          if [ ! -f "$PREVIOUS_XLSX" ]; then
            unset PREVIOUS_XLSX
          fi
          python grant_scraper.py | tee outputs/run.log
          echo "stats=$(tail -n 1 outputs/run.log)" >> "$GITHUB_OUTPUT"
          echo "=== CURRENT DIR ==="
          pwd
          echo "=== FILES IN ROOT ==="
          ls -la .
          echo "=== FILES IN OUTPUTS ==="
          ls -la outputs || true
          echo "=== FILES IN STATE ==="
          ls -la state || true
          echo "=== FIND XLSX ==="
          find . -maxdepth 3 -name "*.xlsx" -print
          test -f outputs/daysee_grants.xlsx

      - name: Save latest snapshot into repository state
        run: |
          cp outputs/daysee_grants.xlsx state/daysee_grants_latest.xlsx
          if [ -f outputs/daysee_grants_delta_only.xlsx ]; then
            cp outputs/daysee_grants_delta_only.xlsx state/daysee_grants_delta_latest.xlsx
          fi
          ls -la state

      - name: Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/daysee_grants_latest.xlsx state/daysee_grants_delta_latest.xlsx || true
          git diff --cached --quiet && echo "No state changes to commit" && exit 0
          git commit -m "chore: update weekly grant snapshot"
          git push

      - name: Upload full workbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: daysee_grants
          path: outputs/daysee_grants.xlsx
          if-no-files-found: error

      - name: Upload delta workbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: daysee_grants_delta_only
          path: outputs/daysee_grants_delta_only.xlsx
          if-no-files-found: warn

      - name: Send weekly email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ATTACH_MAIN: outputs/daysee_grants.xlsx
          ATTACH_DELTA: outputs/daysee_grants_delta_only.xlsx
          STATS_JSON: ${{ steps.scrape.outputs.stats }}
        run: |
          python send_report_email.py
