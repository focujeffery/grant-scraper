name: Weekly Grant Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'
      timezone: 'Asia/Taipei'

permissions:
  contents: write

concurrency:
  group: weekly-grant-scraper
  cancel-in-progress: false

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Prepare folders
        run: |
          mkdir -p outputs
          if [ -f state ]; then
            rm -f state
          fi
          mkdir -p state
          if [ ! -f state/.gitkeep ]; then
            touch state/.gitkeep
          fi

      - name: Run main scraper
        env:
          OUTPUT_XLSX: outputs/daysee_grants.xlsx
          DELTA_XLSX: outputs/daysee_grants_delta_only.xlsx
          PREVIOUS_XLSX: state/daysee_grants_latest.xlsx
          CACHE_JSON: state/title_url_cache.json
        run: |
          if [ ! -f "$PREVIOUS_XLSX" ]; then
            unset PREVIOUS_XLSX
          fi
          set -o pipefail
          python grant_scraper.py | tee outputs/run.log
          echo "=== CURRENT DIR ==="
          pwd
          echo "=== FILES IN ROOT ==="
          ls -la .
          echo "=== FILES IN OUTPUTS ==="
          ls -la outputs || true
          echo "=== FILES IN STATE ==="
          ls -la state || true
          echo "=== FIND XLSX ==="
          find . -maxdepth 3 -name "*.xlsx" -print
          test -f outputs/daysee_grants.xlsx

      - name: Resolve missing official URLs
        env:
          INPUT_XLSX: outputs/daysee_grants.xlsx
          DELTA_XLSX: outputs/daysee_grants_delta_only.xlsx
          CACHE_JSON: state/title_url_cache.json
          MAX_MISSING: "0"
        run: |
          python resolve_missing_urls.py
          test -f outputs/daysee_grants.xlsx

      - name: Save latest snapshot
        run: |
          cp outputs/daysee_grants.xlsx state/daysee_grants_latest.xlsx
          if [ -f outputs/daysee_grants_delta_only.xlsx ]; then
            cp outputs/daysee_grants_delta_only.xlsx state/daysee_grants_delta_latest.xlsx
          fi

      - name: Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/daysee_grants_latest.xlsx state/daysee_grants_delta_latest.xlsx state/title_url_cache.json state/.gitkeep || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update weekly grant state"
            git push
          fi

      - name: Upload full report
        uses: actions/upload-artifact@v4
        with:
          name: daysee_grants
          path: outputs/daysee_grants.xlsx
          if-no-files-found: error

      - name: Upload delta report
        uses: actions/upload-artifact@v4
        with:
          name: daysee_grants_delta_only
          path: outputs/daysee_grants_delta_only.xlsx
          if-no-files-found: warn

      - name: Send email report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ATTACH_MAIN: outputs/daysee_grants.xlsx
          ATTACH_DELTA: outputs/daysee_grants_delta_only.xlsx
        run: |
          python send_report_email.py
