name: Weekly Grant Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'
      timezone: 'Asia/Taipei'

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 使用官方 Playwright Action 安裝瀏覽器與依賴
      - name: Install Playwright browsers
        uses: microsoft/playwright-github-action@v1
        with:
          playwright-version: '1.41.0'  # 可根據需要指定版本

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python grant_scraper.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: grant-reports
          path: daysee_grants_*.xlsx
