name: Weekly Grant Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'
      timezone: 'Asia/Taipei'

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps

      - name: Prepare folders
        run: |
          mkdir -p outputs
          if [ -f state ]; then
            rm -f state
          fi
          mkdir -p state

      - name: Run scraper
        run: |
          python grant_scraper.py
          ls -la .
          ls -la outputs || true

      - name: Upload full report
        uses: actions/upload-artifact@v4
        with:
          name: daysee-grants-full
          path: outputs/daysee_grants.xlsx
          if-no-files-found: error

      - name: Upload delta report
        uses: actions/upload-artifact@v4
        with:
          name: daysee-grants-delta
          path: outputs/daysee_grants_delta_only.xlsx
          if-no-files-found: warn

      - name: Send email report
        if: ${{ secrets.SMTP_HOST != '' && secrets.SMTP_USERNAME != '' && secrets.SMTP_PASSWORD != '' && secrets.EMAIL_TO != '' && secrets.EMAIL_FROM != '' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ATTACH_MAIN: outputs/daysee_grants.xlsx
          ATTACH_DELTA: outputs/daysee_grants_delta_only.xlsx
          STATS_JSON: ${{ steps.collect_stats.outputs.stats_json }}
        run: python send_report_email.py

      - name: Email not configured
        if: ${{ !(secrets.SMTP_HOST != '' && secrets.SMTP_USERNAME != '' && secrets.SMTP_PASSWORD != '' && secrets.EMAIL_TO != '' && secrets.EMAIL_FROM != '') }}
        run: echo "Email secrets not configured. Skip sending email."
